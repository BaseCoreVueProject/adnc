<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>ADNC Docs</title>
  <meta name="description" content="ADNC is a pragmatic .NET 8 reference architecture for modular monoliths, distributed applications, and microservice systems.">
  <meta http-equiv="X-UA-Compatible" content="IE=edge,chrome=1">
  <meta name="description" content="ADNC documentation">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, minimum-scale=1.0">
  <link rel="stylesheet" href="//cdn.jsdelivr.net/npm/docsify@4/lib/themes/vue.css">
  <style>
    .app-nav a {
      border: 1px solid #d0d7de;
      border-radius: 4px;
      padding: 4px 10px;
    }
  </style>
</head>
<body>
  <div id="app"></div>
  <script>
    window.$docsify = {
      name: 'ADNC Docs',
      repo: 'https://github.com/alphayu/adnc',
      loadSidebar: true,
      loadNavbar: true,
      subMaxLevel: 2,
      search: {
        maxAge: 86400000,
        paths: 'auto',
        placeholder: {
          '/README_ZH': '搜索',
          '/wiki/zh-cn/': '搜索',
          '/': 'Search'
        },
        noData: {
          '/README_ZH': '没有结果',
          '/wiki/zh-cn/': '没有结果',
          '/': 'No results'
        },
        depth: 4,
        hideOtherSidebarContent: false
      },
      alias: {
        '/wiki/en/.*/_sidebar.md': '/_sidebar.md',
        '/wiki/zh-cn/.*/_sidebar.md': '/_sidebar_zh.md'
      },
      plugins: [
        function(hook, vm) {
          hook.doneEach(function() {
            var path = vm.route.path || '';
            var useChineseSidebar = path.indexOf('/README_ZH') === 0 || path.indexOf('/wiki/zh-cn/') === 0;
            var sidebarFile = useChineseSidebar ? '/_sidebar_zh.md' : '/_sidebar.md';
            var sidebar = document.querySelector('.sidebar-nav');

            if (!sidebar) {
              return;
            }

            fetch(sidebarFile)
              .then(function(response) {
                return response.text();
              })
              .then(function(markdown) {
                sidebar.innerHTML = renderSidebar(markdown);
              });
          });

          function renderSidebar(markdown) {
            var html = '';
            var inRootList = false;
            var openGroup = false;

            markdown.split('\n').forEach(function(line) {
              var groupMatch = line.match(/^\*\s+(.+)$/);
              var linkMatch = line.match(/^\s{2}\*\s+\[([^\]]+)\]\(([^)]+)\)/);
              var rootLinkMatch = line.match(/^\*\s+\[([^\]]+)\]\(([^)]+)\)/);

              if (rootLinkMatch) {
                if (openGroup) {
                  html += '</ul></li>';
                  openGroup = false;
                }

                if (!inRootList) {
                  html += '<ul>';
                  inRootList = true;
                }

                html += '<li>' + renderLink(rootLinkMatch[1], rootLinkMatch[2]) + '</li>';
                return;
              }

              if (groupMatch && !line.match(/^\*\s+\[/)) {
                if (openGroup) {
                  html += '</ul></li>';
                }

                if (!inRootList) {
                  html += '<ul>';
                  inRootList = true;
                }

                html += '<li><strong>' + escapeHtml(groupMatch[1]) + '</strong><ul>';
                openGroup = true;
                return;
              }

              if (linkMatch) {
                if (!openGroup) {
                  if (!inRootList) {
                    html += '<ul>';
                    inRootList = true;
                  }

                  html += '<li><ul>';
                  openGroup = true;
                }

                html += '<li>' + renderLink(linkMatch[1], linkMatch[2]) + '</li>';
              }
            });

            if (openGroup) {
              html += '</ul></li>';
            }

            if (inRootList) {
              html += '</ul>';
            }

            return html;
          }

          function renderLink(title, href) {
            var docsifyHref = href.indexOf('/') === 0 ? '#' + href : '#/' + href;
            return '<a href="' + docsifyHref + '">' + escapeHtml(title) + '</a>';
          }

          function escapeHtml(value) {
            return value
              .replace(/&/g, '&amp;')
              .replace(/</g, '&lt;')
              .replace(/>/g, '&gt;')
              .replace(/"/g, '&quot;')
              .replace(/'/g, '&#039;');
          }
        }
      ]
    };
  </script>
  <script src="//cdn.jsdelivr.net/npm/docsify@4"></script>
  <script src="//cdn.jsdelivr.net/npm/docsify@4/lib/plugins/search.min.js"></script>
</body>
</html>
